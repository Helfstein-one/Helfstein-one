name: Generate Profile Dashboard

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate 3D Grid & Dashboard (Plugin)
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy scipy matplotlib
          
      - name: Generate Custom 3D Surface Graphs and Pie Chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python generate_3d_commits.py
          python generate_3d_skills.py
          python generate_3d_pie.py
          
      - name: Inject 3D Pie into Dashboard
        run: python inject_pie.py
        
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profile-3d-contrib
          git add 3d_surface_commits.png
          git add 3d_surface_skills.png
          git add 3d_pie_graph.png
          git add profile-3d-contrib/profile-dashboard-injected.svg
          git commit -m "data: generate unified 3D dashboard with pie and surfaces" || exit 0
          git push
